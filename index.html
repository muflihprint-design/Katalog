<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUFLIH PRINT | Luxury Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap');
        
        :root {
            --primary: #1e293b;
            --accent: #d4af37;
            --accent-light: #f59e0b;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            color: #1e293b;
            margin: 0;
            overflow-x: hidden;
        }

        .serif-font { font-family: 'Playfair Display', serif; }

        .slogan-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: 0.15em;
            word-spacing: 0.1em;
        }

        .filter-btn {
            position: relative;
            z-index: 1;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            color: #64748b;
            white-space: nowrap;
            letter-spacing: 0.05em;
        }

        .filter-btn.active { color: #ffffff !important; }

        .active-pill {
            position: absolute;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            background: #0f172a;
            border-radius: 8px;
            z-index: 0;
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid transparent;
            background: #fff;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
        }

        .image-container {
            aspect-ratio: 4 / 5;
            overflow: hidden;
            border-radius: 4px;
            background: #f8fafc;
            position: relative;
        }

        .image-container img { transition: transform 0.8s ease; }
        .product-card:hover .image-container img { transform: scale(1.05); }

        .promo-tag {
            background: #0f172a;
            color: #d4af37;
            border: 1px solid #d4af37;
        }

        #filter-wrapper::-webkit-scrollbar { display: none; }
        #filter-wrapper { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in-up { animation: fadeInUp 0.7s ease-out forwards; }
        .modal-glass { background: rgba(255, 255, 255, 1); }
        .gold-border { border-left: 3px solid #d4af37; }
        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; }

        @media (max-width: 768px) {
            .modal-mobile-full {
                height: auto !important;
                max-height: 95vh !important;
                border-radius: 24px 24px 0 0 !important;
                margin-top: auto;
            }
            .mobile-image-area { height: 45vh !important; }
            .filter-btn {
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
                font-size: 9px !important;
            }
            #filter-wrapper { justify-content: space-between; padding: 0.25rem !important; }
        }

        .zoom-container {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; touch-action: pan-x pan-y;
        }
        
        .zoom-image {
            max-width: 100%; max-height: 100%;
            object-fit: contain; transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .snap-x {
            scroll-snap-type: x mandatory;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .snap-x::-webkit-scrollbar { display: none; }
        .snap-center { scroll-snap-align: center; scroll-snap-stop: always; }
        .zoom-overlay { background: rgba(0,0,0,0.95); }
        .thumb-active { border-color: #d4af37 !important; box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="bg-white">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 py-3 md:px-6 md:py-8">
            <div class="flex flex-col gap-3 md:gap-6">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                       <div class="w-10 h-10 md:w-16 md:h-16 bg-slate-900 flex items-center justify-center overflow-hidden rounded-md p-1.5">
    <img src="https://raw.githubusercontent.com/muflihprint-design/Katalog/refs/heads/main/LOGO%20BARU%20MUFLIH%202021.svg" 
         alt="Logo Muflih Print" 
         class="w-full h-full object-contain">
</div>
                        <div>
                            <h1 class="text-lg md:text-2xl font-bold tracking-[0.2em] uppercase text-slate-900 leading-none">MUFLIH <span class="text-amber-600">PRINT</span></h1>
                            <p class="slogan-font text-[6px] md:text-[8.5px] uppercase text-slate-400 font-medium italic mt-1.5 border-l border-amber-500/30 pl-2 md:pl-3">Jadikan undanganmu bagian dari kenangan terindah</p>
                        </div>
                    </div>
                </div>

                <div class="relative">
                    <nav id="filter-wrapper" class="relative flex items-center bg-slate-50 p-1 rounded-lg overflow-x-auto no-scrollbar border border-slate-100">
                        <div id="active-indicator" class="active-pill"></div>
                        <button onclick="filterData('Semua', this)" class="filter-btn px-4 py-1.5 text-[9px] md:text-[10px] font-bold uppercase active">Semua</button>
                        <button onclick="filterData('Basic', this)" class="filter-btn px-4 py-1.5 text-[9px] md:text-[10px] font-bold uppercase">Basic</button>
                        <button onclick="filterData('Premium', this)" class="filter-btn px-4 py-1.5 text-[9px] md:text-[10px] font-bold uppercase">Premium</button>
                        <button onclick="filterData('Exclusive', this)" class="filter-btn px-4 py-1.5 text-[9px] md:text-[10px] font-bold uppercase">Exclusive</button>
                        <button onclick="filterData('Promo', this)" class="filter-btn px-4 py-1.5 text-[9px] md:text-[10px] font-bold uppercase text-amber-600">Promo</button>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="katalog-grid" class="grid grid-cols-2 md:grid-cols-4 gap-y-8 gap-x-4 md:gap-12">
            <div id="loader" class="col-span-full py-32 flex flex-col items-center">
                <div class="w-6 h-6 border-2 border-slate-900 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-[9px] tracking-[0.4em] uppercase font-bold text-slate-400">Menyusun Katalog...</p>
            </div>
        </div>
    </main>

    <div id="modal-detail" class="fixed inset-0 bg-slate-900/80 hidden z-[100] flex items-end md:items-center justify-center backdrop-blur-sm transition-all p-0 md:p-6 lg:p-12">
        <div class="absolute inset-0" onclick="tutupModal()"></div>
        <div class="modal-glass modal-mobile-full w-full max-w-5xl md:h-[85vh] overflow-hidden relative shadow-2xl flex flex-col md:flex-row animate-in slide-in-from-bottom duration-300">
            
            <button onclick="tutupModal()" class="absolute top-4 right-4 md:top-6 md:right-6 z-[60] bg-white/90 backdrop-blur-xl p-2.5 rounded-full text-slate-900 hover:text-amber-600 shadow-lg transition-all active:scale-95 border border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>

            <div class="w-full md:w-1/2 flex flex-col bg-slate-50 border-b md:border-b-0 md:border-r border-slate-100 mobile-image-area">
                <div class="flex-grow flex items-center justify-center p-6 md:p-12 overflow-hidden cursor-zoom-in relative" onclick="bukaFullscreen()">
                    <img id="modal-main-view" src="" class="max-w-full max-h-full object-contain mix-blend-multiply drop-shadow-2xl transition-all duration-300">
                    <div class="absolute bottom-4 right-4 bg-white/50 backdrop-blur-md text-slate-600 p-2.5 rounded-full md:hidden border border-white/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                    </div>
                </div>
                
                <div class="bg-white/50 border-t border-slate-100 p-4">
                    <div id="modal-thumbnails" class="flex gap-3 overflow-x-auto no-scrollbar w-full justify-center py-1"></div>
                </div>
            </div>

            <div class="w-full md:w-1/2 p-8 md:p-14 flex flex-col bg-white overflow-y-auto custom-scroll">
                <div class="mb-auto">
                    <div class="flex items-center gap-3 mb-4">
                        <span id="modal-tag" class="text-[10px] font-extrabold text-amber-600 uppercase tracking-[0.3em]">KATEGORI</span>
                        <div class="h-[1px] w-8 bg-amber-200"></div>
                    </div>
                    <h2 id="modal-title" class="text-2xl md:text-4xl font-bold text-slate-900 serif-font mb-5 leading-tight uppercase">Nama Produk</h2>
                    
                    <div id="modal-price-container" class="gold-border pl-5 py-2 mb-8 bg-slate-50/50 rounded-r-xl">
                        <p class="text-[9px] uppercase tracking-widest text-slate-400 mb-1 font-bold">Harga Satuan</p>
                        <div id="modal-price-old" class="text-sm line-through text-slate-400 hidden"></div>
                        <div id="modal-price" class="text-2xl md:text-3xl font-light text-slate-900 italic">Harga</div>
                    </div>

                    <div class="space-y-4">
                        <h4 class="text-[10px] font-bold text-slate-900 uppercase tracking-[0.2em] flex items-center gap-2">
                            <span>Spesifikasi Detail</span>
                            <div class="h-[1px] flex-grow bg-slate-100"></div>
                        </h4>
                        <div id="modal-desc" class="text-slate-500 leading-relaxed text-xs md:text-sm font-light italic whitespace-pre-line">Deskripsi produk...</div>
                    </div>
                </div>
                <div class="mt-10 md:mt-14 sticky bottom-0 bg-white pt-4 pb-2 border-t border-slate-50">
                    <a id="modal-wa-btn" href="#" target="_blank" class="group flex items-center justify-between w-full bg-slate-900 text-white p-1 rounded-lg overflow-hidden transition-all hover:bg-slate-800 active:scale-[0.98] shadow-xl shadow-slate-200">
                        <span class="pl-8 text-[11px] font-bold uppercase tracking-[0.25em]">Konsultasi & Pesan</span>
                        <div class="bg-amber-500 p-4 transition-transform group-hover:translate-x-1">
                            <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div id="fullscreen-viewer" class="fixed inset-0 z-[200] zoom-overlay hidden flex flex-col items-center justify-center" onclick="tutupFullscreen()">
        <button class="absolute top-6 right-6 z-[220] text-white/70 bg-white/10 p-2.5 rounded-full hover:bg-white/20 transition-all backdrop-blur-md">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div id="fullscreen-carousel" class="w-full h-full flex overflow-x-auto snap-x snap-mandatory no-scrollbar scroll-smooth" onclick="event.stopPropagation()"></div>
        <div id="fullscreen-dots" class="absolute bottom-8 flex gap-2.5 z-[220]"></div>
    </div>

    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = "https://zqxeoveanevsvynptckm.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpxeGVvdmVhbmV2c3Z5bnB0Y2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzUzODEsImV4cCI6MjA4OTg1MTM4MX0.eeIaytpW1wtWPJc2FbhufkDkhONUt9yypTZU4dTVmsM";
        const WHATSAPP_ADMIN = "6281574009621";
        
        let listProduk = [];
        let currentProductGallery = [];

        // Helper: Format Rupiah
        function formatIDR(val) {
            if (!val || isNaN(val)) return "Hubungi Admin";
            return "Rp " + parseInt(val).toLocaleString('id-ID');
        }

        // Helper: Image URL Processor (Google Drive support)
        function getImageUrl(url) {
            if (!url) return "https://placehold.co/800x1000/f8fafc/1e293b?text=MUFLIH+PRINT";
            url = url.trim();
            if (url.includes('drive.google.com')) {
                let id = "";
                if (url.includes('/d/')) id = url.split('/d/')[1].split('/')[0];
                else if (url.includes('id=')) id = url.split('id=')[1].split('&')[0];
                return id ? `https://lh3.googleusercontent.com/u/0/d/${id}` : url;
            }
            return url;
        }

        // UI: Update Filter Indicator
        function updateIndicator(el) {
            if(!el) return;
            const indicator = document.getElementById('active-indicator');
            indicator.style.width = el.offsetWidth + 'px';
            indicator.style.height = el.offsetHeight + 'px';
            indicator.style.left = el.offsetLeft + 'px';
            indicator.style.top = el.offsetTop + 'px';
        }

        // Data: Fetch from Supabase with Backoff
        async function loadData(retries = 5, delay = 1000) {
            const grid = document.getElementById('katalog-grid');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                    headers: {
                        "apikey": SUPABASE_KEY,
                        "Authorization": `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error("Gagal mengambil data dari server");

                const data = await response.json();
                
                // Mapping Supabase Column -> Application Object
                listProduk = data.map(item => ({
                    id: item.id,
                    nama: item.nama || "Produk Tanpa Nama",
                    harga: item.harga,
                    is_promo: item.is_promo || false,
                    harga_promo: item.harga_promo,
                    deskripsi: item.deskripsi || "Detail produk akan tersedia segera.",
                    gambar: item.image || "", 
                    kategori: item.kategori || "Umum"
                }));

                renderGrid(listProduk);
                setTimeout(() => updateIndicator(document.querySelector('.filter-btn.active')), 300);

            } catch (error) {
                if (retries > 0) {
                    setTimeout(() => loadData(retries - 1, delay * 2), delay);
                } else {
                    grid.innerHTML = `
                        <div class="col-span-full py-20 text-center">
                            <p class="text-red-500 font-bold mb-2">Koneksi Terputus</p>
                            <p class="text-xs text-slate-400">Gagal memuat katalog. Silakan refresh halaman.</p>
                        </div>
                    `;
                }
            }
        }

        function renderGrid(data) {
            const grid = document.getElementById('katalog-grid');
            if (data.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-slate-400 italic">Tidak ada produk ditemukan.</p>`;
                return;
            }

            grid.innerHTML = data.map((item, index) => {
                const daftarGambar = item.gambar.split(',').map(s => s.trim());
                const isPromo = item.is_promo || item.kategori.toLowerCase().includes('promo');
                const displayPrice = isPromo && item.harga_promo ? item.harga_promo : item.harga;
                
                return `
                    <div class="product-card fade-in-up" style="animation-delay: ${index * 0.05}s">
                        <div class="image-container cursor-pointer group" onclick="bukaModalById('${item.id}')">
                            ${isPromo ? '<div class="absolute top-3 right-3 z-10 text-[7px] font-bold px-3 py-1 promo-tag uppercase tracking-[0.1em] rounded-sm">PROMO</div>' : ''}
                            <img src="${getImageUrl(daftarGambar[0])}" class="w-full h-full object-cover" loading="lazy">
                        </div>
                        <div class="mt-5 text-center px-1">
                            <span class="text-[8px] font-bold text-amber-600 uppercase tracking-[0.25em] mb-1.5 block">${item.kategori}</span>
                            <h3 class="font-bold text-slate-900 text-[11px] uppercase tracking-wider mb-1 truncate">${item.nama}</h3>
                            <div class="text-[10px] font-light text-slate-400 italic">${formatIDR(displayPrice)}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterData(kat, el) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            updateIndicator(el);
            
            const query = kat.toLowerCase();
            if (kat === 'Semua') {
                renderGrid(listProduk);
            } else if (kat === 'Promo') {
                renderGrid(listProduk.filter(item => item.is_promo === true || item.kategori.toLowerCase().includes('promo')));
            } else {
                renderGrid(listProduk.filter(item => item.kategori.toLowerCase().includes(query)));
            }
        }

        function bukaModalById(id) {
            const item = listProduk.find(p => p.id == id);
            if(!item) return;

            const daftarGambar = item.gambar.split(',').map(img => img.trim());
            currentProductGallery = daftarGambar; 
            
            const isPromo = item.is_promo && item.harga_promo;
            const priceLabel = document.getElementById('modal-price');
            const oldPriceLabel = document.getElementById('modal-price-old');

            if (isPromo) {
                oldPriceLabel.innerText = formatIDR(item.harga);
                oldPriceLabel.classList.remove('hidden');
                priceLabel.innerText = formatIDR(item.harga_promo);
                priceLabel.classList.add('text-amber-600');
            } else {
                oldPriceLabel.classList.add('hidden');
                priceLabel.innerText = formatIDR(item.harga);
                priceLabel.classList.remove('text-amber-600');
            }
            
            document.getElementById('modal-main-view').src = getImageUrl(daftarGambar[0]);
            document.getElementById('modal-tag').innerText = item.kategori;
            document.getElementById('modal-title').innerText = item.nama;
            document.getElementById('modal-desc').innerText = item.deskripsi;
            
            const waPrice = isPromo ? item.harga_promo : item.harga;
            // Pesan WA diperbarui ke MUFLIH PRINT
            const pesanWA = encodeURIComponent(`Halo MUFLIH PRINT, saya tertarik dengan:\n*${item.nama}*\n(${formatIDR(waPrice)})\n\nSaya ingin info lebih lengkapnya.`);
            document.getElementById('modal-wa-btn').href = `https://wa.me/${WHATSAPP_ADMIN}?text=${pesanWA}`;

            const thumbContainer = document.getElementById('modal-thumbnails');
            thumbContainer.innerHTML = '';
            
            if (daftarGambar.length > 1) {
                daftarGambar.forEach((img, idx) => {
                    const imgUrl = getImageUrl(img);
                    const thumb = document.createElement('div');
                    thumb.className = `w-14 h-14 p-0.5 bg-white border border-slate-200 cursor-pointer rounded-lg shadow-sm flex-shrink-0 transition-all hover:border-amber-400 ${idx === 0 ? 'thumb-active' : ''}`;
                    thumb.innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover rounded-md">`;
                    thumb.onclick = (e) => {
                        e.stopPropagation();
                        document.getElementById('modal-main-view').src = imgUrl;
                        thumbContainer.querySelectorAll('div').forEach(d => d.classList.remove('thumb-active'));
                        thumb.classList.add('thumb-active');
                    };
                    thumbContainer.appendChild(thumb);
                });
                thumbContainer.parentElement.classList.remove('hidden');
            } else {
                thumbContainer.parentElement.classList.add('hidden');
            }

            document.getElementById('modal-detail').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function tutupModal() {
            document.getElementById('modal-detail').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // --- Fullscreen Viewer Logic ---
        function initZoom(container, img) {
            let scale = 1, lastScale = 1, startDistance = 0, startX = 0, startY = 0, currentX = 0, currentY = 0, lastX = 0, lastY = 0, isDragging = false, lastTap = 0;
            const updateTransform = () => img.style.transform = `translate(${currentX}px, ${currentY}px) scale(${scale})`;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    startDistance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                } else if (e.touches.length === 1) {
                    const now = Date.now();
                    if (now - lastTap < 300) { 
                        scale = scale > 1 ? 1 : 2.5; 
                        currentX = 0; currentY = 0; 
                        updateTransform(); 
                        e.preventDefault(); 
                    }
                    lastTap = now;
                    isDragging = true; 
                    startX = e.touches[0].pageX - lastX; 
                    startY = e.touches[0].pageY - lastY;
                }
            });

            container.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2) {
                    const distance = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                    scale = Math.min(Math.max(1, lastScale * (distance / startDistance)), 4);
                    updateTransform(); 
                    e.preventDefault();
                } else if (e.touches.length === 1 && isDragging && scale > 1) {
                    currentX = e.touches[0].pageX - startX; 
                    currentY = e.touches[0].pageY - startY;
                    updateTransform(); 
                    e.preventDefault();
                }
            }, { passive: false });

            container.addEventListener('touchend', () => {
                lastScale = scale; lastX = currentX; lastY = currentY; isDragging = false;
                if (scale <= 1.1) { 
                    scale = 1; lastScale = 1; currentX = 0; currentY = 0; lastX = 0; lastY = 0; 
                    updateTransform(); 
                    document.getElementById('fullscreen-carousel').style.overflowX = 'auto'; 
                } else {
                    document.getElementById('fullscreen-carousel').style.overflowX = 'hidden'; 
                }
            });
        }

        function bukaFullscreen() {
            const viewer = document.getElementById('fullscreen-viewer');
            const carousel = document.getElementById('fullscreen-carousel');
            const dotsContainer = document.getElementById('fullscreen-dots');
            const currentImgSrc = document.getElementById('modal-main-view').src;
            
            carousel.innerHTML = ''; 
            dotsContainer.innerHTML = '';
            viewer.classList.remove('hidden');

            let selectedIdx = 0;

            currentProductGallery.forEach((img, idx) => {
                const fullUrl = getImageUrl(img);
                if (fullUrl === currentImgSrc) selectedIdx = idx;

                const slide = document.createElement('div');
                slide.className = "flex-shrink-0 w-full h-full snap-center flex items-center justify-center";
                
                const zoomCont = document.createElement('div'); 
                zoomCont.className = "zoom-container";
                
                const zoomImg = document.createElement('img'); 
                zoomImg.src = fullUrl; 
                zoomImg.className = "zoom-image drop-shadow-2xl";
                
                zoomCont.appendChild(zoomImg); 
                slide.appendChild(zoomCont); 
                carousel.appendChild(slide);
                
                initZoom(zoomCont, zoomImg);

                const dot = document.createElement('div');
                dot.className = `w-2 h-2 rounded-full transition-all duration-300 ${fullUrl === currentImgSrc ? 'bg-amber-500 w-6' : 'bg-white/30'}`;
                dotsContainer.appendChild(dot);
            });

            setTimeout(() => {
                carousel.scrollLeft = selectedIdx * carousel.offsetWidth;
            }, 10);

            carousel.onscroll = () => {
                const activeIndex = Math.round(carousel.scrollLeft / carousel.offsetWidth);
                const dots = dotsContainer.querySelectorAll('div');
                dots.forEach((d, i) => {
                    if(i === activeIndex) { 
                        d.classList.add('bg-amber-500', 'w-6'); 
                        d.classList.remove('bg-white/30'); 
                    } else { 
                        d.classList.remove('bg-amber-500', 'w-6'); 
                        d.classList.add('bg-white/30'); 
                    }
                });
            };
        }

        function tutupFullscreen() { 
            document.getElementById('fullscreen-viewer').classList.add('hidden'); 
        }

        window.onload = loadData;
        window.onresize = () => updateIndicator(document.querySelector('.filter-btn.active'));
    </script>
</body>
</html>
